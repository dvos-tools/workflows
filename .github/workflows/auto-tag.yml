name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          # Find latest tag matching clean semver (v#.#.#), ignore pre-release
          tag=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$tag" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No existing tags found. Will use initial version."
          else
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "Latest tag: $tag"
          fi

      - name: Get commits since last tag
        id: commits
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if [ -z "$TAG" ]; then
            # No previous tags — get all commits
            COMMITS=$(git log --format="%H %s%n%b" --no-merges)
          else
            COMMITS=$(git log "${TAG}..HEAD" --format="%H %s%n%b" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits since last tag. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # Store commits in a temp file for the next step
            echo "$COMMITS" > /tmp/commits.txt
            echo "Commits found since ${TAG:-beginning}:"
            echo "$COMMITS" | head -20
          fi

      - name: Determine bump type
        if: steps.commits.outputs.skip != 'true'
        id: bump
        run: |
          BUMP="patch"

          while IFS= read -r line; do
            # Skip empty lines
            [ -z "$line" ] && continue

            # Check for BREAKING CHANGE in body/footer
            if echo "$line" | grep -qE "^BREAKING CHANGE"; then
              BUMP="major"
              break
            fi

            # Check for conventional commit prefix with ! (breaking)
            # Matches: type!: or type(scope)!:
            if echo "$line" | grep -qE "^[a-z]+(\([a-z0-9_-]+\))?!:"; then
              BUMP="major"
              break
            fi

            # Check for feat (minor) — only upgrade if not already major
            if [ "$BUMP" != "major" ]; then
              if echo "$line" | grep -qE "^feat(\([a-z0-9_-]+\))?:"; then
                BUMP="minor"
              fi
            fi
          done < /tmp/commits.txt

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Create tag
        if: steps.commits.outputs.skip != 'true'
        id: newtag
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          BUMP="${{ steps.bump.outputs.type }}"

          if [ -z "$TAG" ]; then
            NEW_VERSION="v0.0.1"
          else
            MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$TAG" | sed 's/^v//' | cut -d. -f3)

            case "$BUMP" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          # Check if tag already exists
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists. Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous-version=${TAG:-none}" >> "$GITHUB_OUTPUT"
          echo "bump-type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Created and pushed tag: $NEW_VERSION (was: ${TAG:-none}, bump: $BUMP)"
